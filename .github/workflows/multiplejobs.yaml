name: multiplejobs workflow
on: 
  workflow_dispatch:
  push:
jobs:
  job1:
      runs-on: ubuntu-latest
      steps:
      - name: clone
        run: git clone https://github.com/ajnaidu/sample.git
      - name: pwd-before
        run: pwd
      - name: build
        run: |
          cd sample
          mvn clean install
      - name: deploy 
        run: echo "deploying the project..."
